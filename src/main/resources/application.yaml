spring:
  application:
    name: payment-service

management:
  endpoints:
    web:
      exposure:
        include: health    

server:
  port: 8081
  servlet:
    context-path: /api/payment-service/v1

aws:
  dynamodb:
    table-name: PAYMENT

  sns:
    order-topic-arn: arn:aws:sns:us-east-1:200849340204:order-events

  sqs:
    payment-queue: payment-queue

